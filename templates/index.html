{% extends "layout.html" %}

{% block content %}
<h2 class="mb-3">EC2 Инстанции</h2>

<a href="{{ url_for('create_instance') }}" class="btn btn-primary mb-3">+ Създай нова инстанция</a>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Име</th>
            <th>Тип</th>
            <th>Състояние</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for instance in instances %}
        <tr>
            <td>{{ instance.id }}</td>
            <td>{{ instance.name }}</td>
            <td>{{ instance.instance_type }}</td>
            <td>{{ instance.state }}</td>
            <td>
                <form action="{{ url_for('start_instance', instance_id=instance.id) }}" method="post" style="display:inline;">
                    <button class="btn btn-success btn-sm">Start</button>
                </form>

                <form action="{{ url_for('stop_instance', instance_id=instance.id) }}" method="post" style="display:inline;">
                    <button class="btn btn-warning btn-sm">Stop</button>
                </form>

                <form action="{{ url_for('terminate_instance', instance_id=instance.id) }}" method="post" style="display:inline;">
                    <button class="btn btn-danger btn-sm">Terminate</button>
                </form>

                <a href="{{ url_for('instance_details', instance_id=instance.id) }}" class="btn btn-secondary btn-sm">Details</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
